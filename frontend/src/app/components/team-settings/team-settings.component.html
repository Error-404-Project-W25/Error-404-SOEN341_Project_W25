<div class="container">
  <div class="form-container">
    <h1>Edit Team</h1>
    <form class="form" #teamForm="ngForm">
      <div class="form-group">
        <label>Team Name</label>
        <input
          type="text"
          [(ngModel)]="teamName"
          name="teamName"
          #teamNameInput="ngModel"
        />
      </div>
      <div class="form-group">
        <label for="textarea">Description</label>
        <textarea
          cols="50"
          rows="10"
          id="textarea"
          name="textarea"
          [(ngModel)]="description"
          #descriptionInput="ngModel"
        ></textarea>
      </div>
      <button
        type="submit"
        class="form-submit-btn"
        [disabled]="teamForm.invalid"
      >
        UPDATE
      </button>
    </form>
  </div>
</div>
